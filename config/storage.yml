test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# MinIO — S3-compatible local storage for development.
# Install: brew install minio  OR  docker run -p 9000:9000 -p 9001:9001 \
#   -e "MINIO_ROOT_USER=minioadmin" -e "MINIO_ROOT_PASSWORD=minioadmin" \
#   minio/minio server /data --console-address ":9001"
# Console: http://localhost:9001  |  Create bucket "padeex-dev" there.
minio:
  service: S3
  endpoint:          <%= ENV.fetch("MINIO_ENDPOINT", "http://localhost:9000") %>
  access_key_id:     <%= ENV["MINIO_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["MINIO_SECRET_ACCESS_KEY"] %>
  region:            us-east-1
  bucket:            <%= ENV.fetch("MINIO_BUCKET", "padeex-dev") %>
  force_path_style:  true

# Amazon S3 — staging / production storage.
amazon:
  service: S3
  access_key_id:     <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
  region:            <%= ENV.fetch("AWS_REGION", "sa-east-1") %>
  bucket:            <%= ENV["AWS_BUCKET"] %>
